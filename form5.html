<html>
<head>
<link rel="stylesheet" href="formstyle.css">
<title>Sign In</title>
</head>
<body>
<center>
<div class="container">
<h1>Sign In</h1>
<form method="post">
<label>Name:</label><input type="text" name="name" placeholder="Enter your name"><br><br>
<label>Email:</label><input type="email" name="email" placeholder="example@gamil.com"><br><br>
<label>Password:</label><input type="password" name="password" placeholder="enter password"><br><br>
<label>Gender:</label>
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female<br><br>
<label>Preference:</label>
<select id="preference">
<option>Ready-made perfumes</option>
<option selected>Scent Fingerprint</option>
<option>Both</option>
</select>
<br><br>
<input type="submit" class="submit">
</form>
</div>
</center>
</body>
</html>
